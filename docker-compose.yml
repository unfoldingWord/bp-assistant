services:
  zulip-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zulip-bot
    restart: unless-stopped
    env_file:
      - ../config/.env
    volumes:
      - ../workspace:/workspace
      - ../config:/config
      - ./data:/app/data
      - claude-config:/claude-config
    working_dir: /app
    ports:
      - "127.0.0.1:3001:3001"
    secrets:
      - bt_mcp_api_token
    networks:
      - work-net
      - home-net
    deploy:
      resources:
        limits:
          memory: 4g

secrets:
  bt_mcp_api_token:
    file: ../config/secrets/bt_mcp_api_token

volumes:
  claude-config:
    external: true
    name: bot_claude-config

networks:
  work-net:
    external: true
  home-net:
    external: true
