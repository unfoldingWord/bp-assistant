services:
  zulip-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zulip-bot
    restart: unless-stopped
    env_file:
      - ../config/.env
    user: "1001"
    environment:
      - CSKILLBP_DIR=/workspace
      - DOOR43_REPOS_PATH=/workspace/door43-repos
      - HEBREW_DIR=/workspace/data/hebrew_bible
      - DOOR43_TOKEN_FILE=/run/secrets/door43_token
      - DOOR43_USERNAME_FILE=/run/secrets/door43_username
      - ZULIP_EMAIL_FILE=/run/secrets/zulip_email
      - ZULIP_API_KEY_FILE=/run/secrets/zulip_api_key
    volumes:
      - ../workspace:/workspace
      - ../config:/config
      - ./data:/app/data
      - claude-config:/claude-config
    working_dir: /app
    ports:
      - "127.0.0.1:3001:3001"
    secrets:
      - bt_mcp_api_token
      - claude_oauth_token
      - door43_token
      - door43_username
      - zulip_email
      - zulip_api_key
      - github_token
    networks:
      - work-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 4g

secrets:
  bt_mcp_api_token:
    file: ../config/secrets/bt_mcp_api_token
  claude_oauth_token:
    file: ../config/secrets/claude_oauth_token
  door43_token:
    file: ../config/secrets/door43_token
  door43_username:
    file: ../config/secrets/door43_username
  zulip_email:
    file: ../config/secrets/zulip_email
  zulip_api_key:
    file: ../config/secrets/zulip_api_key
  github_token:
    file: ../config/secrets/github_token

volumes:
  claude-config:
    external: true
    name: bot_claude-config

networks:
  work-net:
    external: true
